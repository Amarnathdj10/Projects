<!DOCTYPE html>
<html>
<head>
    <title>Elite Player Recognition AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="card">
    <h1>Elite Player Recognition</h1>
    <p class="subheading">ML-based Football Identity Classification</p>

    <div class="drop-zone" id="dropZone">
        <p>Drag & Drop Image Here</p>
        <span>or click to browse</span>
        <input type="file" id="imageInput" hidden>
    </div>

    <button onclick="uploadImage()" class="predict-btn">Predict</button>

    <div class="preview-container">
        <img id="preview">
    </div>

    <div id="result" class="result-box"></div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
